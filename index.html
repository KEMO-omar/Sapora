<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sapora Rocket MEGA PRO 2026 | المستر كريم عمر</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* --- المتغيرات الثيمات (Dark/Light) --- */
        :root {
            --primary: #4361ee; --primary-glow: rgba(67, 97, 238, 0.3);
            --neon: #00f2ff; --secondary: #7209b7;
            --danger: #ef4444; --success: #10b981;
            --trans: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        [data-theme="light"] {
            --bg: #f8fafc; --surface: #ffffff; --text: #0f172a;
            --glass: rgba(255, 255, 255, 0.95);
            --shadow: 0 10px 25px rgba(0,0,0,0.05); --border: #e2e8f0;
            --canvas-bg: #ffffff;
        }
        [data-theme="dark"] {
            --bg: #0f172a; --surface: #1e293b; --text: #f1f5f9;
            --glass: rgba(30, 41, 59, 0.95);
            --shadow: 0 10px 25px rgba(0,0,0,0.5); --border: #334155;
            --canvas-bg: #0b1120;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; width: 100vw; overflow: hidden; touch-action: none; transition: var(--trans); }

        /* --- شاشة الدخول --- */
        #auth-screen { position: fixed; inset: 0; background: radial-gradient(circle at center, var(--primary), var(--bg)); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--surface); padding: 40px; border-radius: 35px; width: 90%; max-width: 450px; text-align: center; box-shadow: var(--shadow); animation: bounceIn 0.8s ease; border: 1px solid var(--border); }
        @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.3); } 50% { opacity: 0.9; transform: scale(1.05); } 100% { opacity: 1; transform: scale(1); } }
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        .input-group input { width: 100%; padding: 15px 45px 15px 15px; border: 2px solid var(--border); background: var(--bg); color: var(--text); border-radius: 15px; outline: none; font-size: 16px; transition: var(--trans); text-align: center; }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-glow); }
        .auth-buttons { display: flex; gap: 15px; }
        .btn-auth { flex: 1; padding: 15px; border: none; border-radius: 15px; color: white; font-weight: 800; cursor: pointer; transition: var(--trans); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-teacher { background: var(--primary); } .btn-student { background: var(--success); }

        /* --- الواجهة العلوية و القوائم --- */
        .top-nav { position: fixed; top: 0; left: 0; width: 100%; height: 80px; display: none; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 5000; pointer-events: none; }
        .nav-badge { background: var(--glass); padding: 10px 20px; border-radius: 20px; box-shadow: var(--shadow); pointer-events: auto; display: flex; align-items: center; gap: 12px; backdrop-filter: blur(10px); border: 1px solid var(--border); cursor: pointer; color: var(--text); }
        .badge-icon { width: 40px; height: 40px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        
        #users-sidebar { position: fixed; right: 20px; top: 90px; width: 300px; background: var(--glass); border-radius: 25px; padding: 20px; box-shadow: var(--shadow); display: none; z-index: 4500; max-height: 500px; overflow-y: auto; backdrop-filter: blur(10px); border: 1px solid var(--border); }
        .user-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-radius: 12px; margin-bottom: 8px; background: var(--bg); border: 1px solid var(--border); }
        .btn-grant { padding: 5px 10px; font-size: 11px; border: none; border-radius: 8px; cursor: pointer; font-weight: 800; }
        .granted { background: var(--success); color: white; } .not-granted { background: var(--border); color: var(--text); }

        /* --- شريط الأدوات (Adaptive Toolbar) --- */
        #toolbar-container { position: fixed; z-index: 6000; display: none; transition: var(--trans); }
        #smart-toolbar { background: var(--glass); padding: 12px; border-radius: 30px; box-shadow: var(--shadow); display: flex; backdrop-filter: blur(15px); border: 2px solid var(--border); gap: 8px; }
        .pos-bottom { bottom: 30px; left: 50%; transform: translateX(-50%); flex-direction: row; }
        .pos-top { top: 90px; left: 50%; transform: translateX(-50%); flex-direction: row; }
        .pos-left { left: 30px; top: 50%; transform: translateY(-50%); flex-direction: column; }
        .pos-right { right: 30px; top: 50%; transform: translateY(-50%); flex-direction: column; }

        .tool-btn { width: 52px; height: 52px; border-radius: 18px; border: none; background: transparent; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 22px; transition: var(--trans); position: relative; }
        .tool-btn:hover { background: var(--primary-glow); color: var(--primary); }
        .tool-btn.active { background: var(--primary); color: white; box-shadow: 0 10px 20px var(--primary-glow); }

        /* --- القوائم المنبثقة --- */
        .pop-menu { position: absolute; background: var(--surface); border-radius: 25px; padding: 20px; box-shadow: var(--shadow); display: none; min-width: 240px; z-index: 7000; border: 1px solid var(--border); color: var(--text); }
        .active-menu { display: block !important; animation: popAnim 0.3s ease; }
        .anchor-top { bottom: 70px; left: 50%; transform: translateX(-50%); } .anchor-bottom { top: 70px; left: 50%; transform: translateX(-50%); }
        .anchor-right { left: 70px; top: 0; } .anchor-left { right: 70px; top: 0; }
        @keyframes popAnim { from { opacity: 0; transform: scale(0.8) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .brush-opt, .shape-opt { display: flex; align-items: center; gap: 15px; padding: 12px; border-radius: 15px; cursor: pointer; transition: 0.2s; margin-bottom: 5px; background: var(--bg); border: 1px solid transparent; }
        .brush-opt:hover, .shape-opt:hover { border-color: var(--primary); }
        .shape-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .shape-opt { justify-content: center; font-size: 20px; }
        .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .color-dot { width: 32px; height: 32px; border-radius: 10px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .color-dot.active { border-color: var(--text); transform: scale(1.1); }

        /* --- Canvas & Overlays --- */
        #board-container { position: absolute; inset: 0; overflow: hidden; background: var(--canvas-bg); }
        canvas { position: absolute; top: 0; left: 0; display: block; touch-action: none; cursor: crosshair; }
        #cursors-layer { pointer-events: none; z-index: 1000; }
        
        #screen-lock-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; backdrop-filter: blur(10px); }

        /* --- الشات --- */
        #chat-window { position: fixed; bottom: 100px; right: 30px; width: 350px; height: 500px; background: var(--surface); border-radius: 30px; box-shadow: var(--shadow); display: none; flex-direction: column; overflow: hidden; z-index: 5500; border: 1px solid var(--border); }
        .chat-header { background: var(--primary); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; font-weight: 800; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: var(--bg); }
        .msg-box { position: relative; background: var(--surface); color: var(--text); padding: 10px 15px; border-radius: 18px; font-size: 14px; max-width: 85%; align-self: flex-start; border: 1px solid var(--border); }
        .msg-box.mine { align-self: flex-end; background: var(--primary); color: white; }
        .del-btn { position: absolute; left: -25px; top: 10px; color: var(--danger); cursor: pointer; font-size: 12px; display: none; }
        .is-teacher .del-btn { display: block; }
    </style>
</head>
<body>

    <div id="screen-lock-overlay">
        <i class="fas fa-lock" style="font-size: 60px; color: var(--danger); margin-bottom: 20px;"></i>
        <h1 style="font-weight: 900;">الشاشة مقفولة من المستر</h1>
        <p>ركز في الشرح دلوقتي!</p>
    </div>

    <div id="auth-screen">
        <div class="auth-card">
            <h1 style="color: var(--primary); font-weight: 900; font-size: 32px;">صاروخ المستر 🚀</h1>
            <p style="color: #64748b; margin-bottom: 25px;">الإصدار الأسطوري 2026 - MEGA PRO</p>
            <div class="input-group"><i class="fas fa-user"></i><input type="text" id="userName" placeholder="اسمك بالكامل"></div>
            <div class="input-group"><i class="fas fa-hashtag"></i><input type="text" id="roomID" placeholder="كود الغرفة"></div>
            <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="roomPass" placeholder="كلمة السر"></div>
            <div class="auth-buttons">
                <button class="btn-auth btn-teacher" onclick="auth('teacher')"><i class="fas fa-chalkboard-teacher"></i> معلم</button>
                <button class="btn-auth btn-student" onclick="auth('student')"><i class="fas fa-user-graduate"></i> طالب</button>
            </div>
        </div>
    </div>

    <div class="top-nav" id="main-nav">
        <div style="display:flex; gap:10px;">
            <div class="nav-badge" onclick="toggleSidebar()"><div class="badge-icon"><i class="fas fa-users"></i></div>
                <div><div style="font-weight: 800; font-size: 14px;">المتواجدون: <span id="online-count">0</span></div>
                <div style="font-size: 10px; color: var(--success);">نشط الآن</div></div>
            </div>
            <div class="nav-badge is-teacher-only" id="lock-btn" onclick="toggleScreenLock()" style="display:none; background:var(--danger); color:white;">
                <i class="fas fa-unlock" id="lock-icon"></i> <span id="lock-text">قفل الشاشة</span>
            </div>
        </div>
        <div class="nav-badge">
            <button class="is-teacher-only" onclick="changePage(-1)" style="border:none; background:none; cursor:pointer; color:var(--text); display:none;"><i class="fas fa-chevron-right"></i></button>
            <span style="font-weight: 900; min-width: 80px; text-align: center;">صفحة <span id="page-num">1</span></span>
            <button class="is-teacher-only" onclick="changePage(1)" style="border:none; background:none; cursor:pointer; color:var(--text); display:none;"><i class="fas fa-chevron-left"></i></button>
        </div>
        <div style="display:flex; gap:10px;">
            <div class="nav-badge" onclick="toggleTheme()"><i class="fas fa-moon" id="theme-icon"></i></div>
            <div class="nav-badge" onclick="toggleFullScreen()"><div class="badge-icon" style="background: var(--text); color:var(--bg);"><i class="fas fa-expand"></i></div></div>
        </div>
    </div>

    <div id="users-sidebar">
        <div style="display:flex; justify-content:space-between; margin-bottom: 15px; border-bottom: 2px solid var(--border); padding-bottom: 10px;">
            <h3>الطلاب (<span id="side-count">0</span>)</h3>
            <button class="is-teacher-only btn-grant not-granted" onclick="muteAllChat()" style="display:none;"><i class="fas fa-microphone-slash"></i> كتم الشات</button>
        </div>
        <div id="users-list"></div>
    </div>

    <div id="board-container">
        <canvas id="board"></canvas>
        <canvas id="cursors-layer"></canvas> </div>

    <div id="toolbar-container" class="pos-bottom">
        <div id="smart-toolbar">
            <button class="tool-btn" onclick="cycleToolbarPosition()" title="نقل الشريط"><i class="fas fa-sync-alt"></i></button>
            
            <div style="position:relative;">
                <button class="tool-btn active" id="pen-btn" onclick="toggleDynamicMenu('pen-menu')"><i class="fas fa-paint-brush"></i></button>
                <div id="pen-menu" class="pop-menu">
                    <div class="brush-opt" onclick="setMode('pen', 'normal')"><i class="fas fa-pen" style="color:var(--primary);"></i> <b>قلم عادي</b></div>
                    <div class="brush-opt" onclick="setMode('pen', 'neon')"><i class="fas fa-magic" style="color:var(--neon);"></i> <b>قلم نيون</b></div>
                    <div class="brush-opt" onclick="setMode('pen', 'marker')"><i class="fas fa-highlighter" style="color:#fbbf24;"></i> <b>ماركر شفاف</b></div>
                    <div class="brush-opt" onclick="setMode('pen', 'pencil')"><i class="fas fa-pencil-alt" style="color:#64748b;"></i> <b>قلم رصاص</b></div>
                    <div class="brush-opt" onclick="setMode('pen', 'calligraphy')"><i class="fas fa-feather-alt" style="color:var(--secondary);"></i> <b>خط عربي</b></div>
                    <div class="brush-opt" onclick="setMode('pen', 'laser')"><i class="fas fa-bolt" style="color:var(--danger);"></i> <b>ليزر (يختفي)</b></div>
                    <hr style="margin:10px 0; border:none; border-top:1px solid var(--border);">
                    <div style="font-weight:800;">الحجم: <span id="size-val">4</span>px</div>
                    <input type="range" id="size-slider" min="1" max="60" value="4" style="width:100%; accent-color:var(--primary);">
                </div>
            </div>

            <div style="position:relative;">
                <button class="tool-btn" id="shape-btn" onclick="toggleDynamicMenu('shape-menu')"><i class="fas fa-shapes"></i></button>
                <div id="shape-menu" class="pop-menu">
                    <div class="shape-grid">
                        <div class="shape-opt" onclick="setMode('shape', 'rect')" title="مربع"><i class="far fa-square"></i></div>
                        <div class="shape-opt" onclick="setMode('shape', 'circle')" title="دائرة"><i class="far fa-circle"></i></div>
                        <div class="shape-opt" onclick="setMode('shape', 'triangle')" title="مثلث"><i class="fas fa-caret-up"></i></div>
                        <div class="shape-opt" onclick="setMode('shape', 'line')" title="خط"><i class="fas fa-minus" style="transform:rotate(-45deg);"></i></div>
                        <div class="shape-opt" onclick="setMode('shape', 'arrow')" title="سهم"><i class="fas fa-long-arrow-alt-left"></i></div>
                        <div class="shape-opt" onclick="setMode('shape', 'star')" title="نجمة"><i class="far fa-star"></i></div>
                    </div>
                </div>
            </div>

            <div style="position:relative;">
                <button class="tool-btn" id="color-btn" onclick="toggleDynamicMenu('color-menu')"><i class="fas fa-palette"></i></button>
                <div id="color-menu" class="pop-menu">
                    <div class="color-grid" id="colors-container"></div>
                    <input type="color" id="custom-color" style="width:100%; height:40px; margin-top:15px; border:none; cursor:pointer;">
                </div>
            </div>

            <div style="position:relative;">
                <button class="tool-btn" id="eraser-btn" onclick="toggleDynamicMenu('eraser-menu')"><i class="fas fa-eraser"></i></button>
                <div id="eraser-menu" class="pop-menu">
                    <div class="brush-opt" onclick="setMode('eraser', 'stroke')"><i class="fas fa-eraser"></i> <b>مسح عادي</b></div>
                    <div class="brush-opt" onclick="setMode('eraser', 'object')"><i class="fas fa-vector-square"></i> <b>مسح كائن (Object)</b></div>
                </div>
            </div>

            <button class="tool-btn" id="pan-btn" onclick="setMode('pan', '')" title="تحريك اللوحة"><i class="fas fa-hand-paper"></i></button>
            <button class="tool-btn" onclick="resetView()" title="إعادة ضبط الرؤية"><i class="fas fa-compress-arrows-alt"></i></button>
            <button class="tool-btn is-teacher-only" onclick="clearFullBoard()" style="color:var(--danger); display:none;"><i class="fas fa-trash-alt"></i></button>
            <button class="tool-btn" onclick="toggleChat()"><i class="fas fa-comment-alt"></i></button>
        </div>
    </div>

    <div id="chat-window">
        <div class="chat-header"><span>دردشة الصاروخ</span><i class="fas fa-times" onclick="toggleChat()" style="cursor:pointer;"></i></div>
        <div id="chat-messages"></div>
        <div style="padding:15px; display:flex; gap:10px; background:var(--surface); border-top:1px solid var(--border);">
            <input type="text" id="chat-inp" placeholder="اكتب سؤالك..." style="flex:1; padding:12px; border-radius:12px; border:1px solid var(--border); outline:none; background:var(--bg); color:var(--text);">
            <button onclick="sendMsg()" style="background:var(--primary); color:white; border:none; width:50px; border-radius:12px; cursor:pointer;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        // --- 1. Firebase Engine ---
        const firebaseConfig = { apiKey: "AIzaSyAVFNJhGIlOjyJgSGj9MqK4Xt89p_irSEQ", databaseURL: "https://sapora-f738b-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- 2. Core State & Variables ---
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d', { desynchronized: true, alpha: false });
        const cursorsCanvas = document.getElementById('cursors-layer');
        const cursorsCtx = cursorsCanvas.getContext('2d');
        
        let isTeacher = false, hasWritePermission = false;
        let myName = "", roomID = "", currentPage = 1;
        let mode = 'pen', subMode = 'normal'; // Modes: pen, shape, eraser, pan
        let color = '#ffffff', size = 4;
        let isDrawing = false, isPanning = false;
        
        // Transform Matrix (Zoom & Pan)
        let transform = { x: 0, y: 0, scale: 1 };
        let startX, startY, currentPath = [];
        let drawings = {}; // Local cache of all shapes on page
        let otherCursors = {};
        let isScreenLocked = false, isChatMuted = false;

        // --- 3. Initialization & Auth ---
        function resize() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            cursorsCanvas.width = window.innerWidth; cursorsCanvas.height = window.innerHeight;
            renderEngine();
        }
        window.addEventListener('resize', resize);
        resize();

        function auth(role) {
            myName = document.getElementById('userName').value.trim();
            roomID = document.getElementById('roomID').value.trim();
            let pass = document.getElementById('roomPass').value.trim();
            if(!myName || !roomID) return alert("يا بطل، كمل بياناتك الأول!");

            db.ref(`rooms/${roomID}/config`).once('value', (s) => {
                let conf = s.val();
                if(role === 'teacher') {
                    if(!conf || conf.pass === pass) {
                        if(!conf) db.ref(`rooms/${roomID}/config`).set({ pass, locked: false, chatMuted: false });
                        isTeacher = true; hasWritePermission = true; startMegaSystem();
                    } else alert("الباسورد غلط يا مستر!");
                } else {
                    if(conf) { isTeacher = false; startMegaSystem(); } else alert("الغرفة دي مش موجودة ع الكوكب!");
                }
            });
        }

        function startMegaSystem() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-nav').style.display = 'flex';
            document.getElementById('toolbar-container').style.display = 'block';
            if(isTeacher) {
                document.body.classList.add('is-teacher');
                document.querySelectorAll('.is-teacher-only').forEach(el => el.style.display = 'flex');
            }

            // Presence & Permission Node
            let userRef = db.ref(`rooms/${roomID}/users/${myName}`);
            userRef.set({ role: isTeacher?'teacher':'student', canDraw: isTeacher });
            userRef.onDisconnect().remove();

            setupMegaListeners();
            initColors();
        }

        // --- 4. Super Backend Listeners ---
        function setupMegaListeners() {
            // Users & Permissions
            db.ref(`rooms/${roomID}/users`).on('value', s => {
                let users = s.val() || {};
                let count = Object.keys(users).length;
                document.getElementById('online-count').innerText = count;
                document.getElementById('side-count').innerText = count;
                
                if(!isTeacher && users[myName]) hasWritePermission = users[myName].canDraw;

                let html = "";
                for(let u in users) {
                    let isG = users[u].canDraw;
                    let badge = users[u].role === 'teacher' ? '👑 مستر' : '👨‍🎓 طالب';
                    html += `<div class="user-item">
                        <div><b>${u}</b> <span style="font-size:10px; color:var(--primary);">${badge}</span></div>
                        ${isTeacher && u !== myName ? `<button class="btn-grant ${isG?'granted':'not-granted'}" onclick="togglePermission('${u}', ${isG})">${isG?'سحب القلم':'إعطاء القلم'}</button>` : ''}
                    </div>`;
                }
                document.getElementById('users-list').innerHTML = html;
            });

            // Page Sync
            db.ref(`rooms/${roomID}/state/page`).on('value', s => {
                if(s.exists() && s.val() !== currentPage) {
                    currentPage = s.val();
                    document.getElementById('page-num').innerText = currentPage;
                    loadDrawings();
                }
            });
            loadDrawings(); // Initial load

            // Screen Lock
            db.ref(`rooms/${roomID}/config/locked`).on('value', s => {
                isScreenLocked = s.val();
                if(!isTeacher) document.getElementById('screen-lock-overlay').style.display = isScreenLocked ? 'flex' : 'none';
                else {
                    let btn = document.getElementById('lock-btn');
                    btn.style.background = isScreenLocked ? 'var(--success)' : 'var(--danger)';
                    document.getElementById('lock-text').innerText = isScreenLocked ? 'فتح الشاشة' : 'قفل الشاشة';
                    document.getElementById('lock-icon').className = isScreenLocked ? 'fas fa-lock' : 'fas fa-unlock';
                }
            });

            // Chat Mute
            db.ref(`rooms/${roomID}/config/chatMuted`).on('value', s => isChatMuted = s.val());

            // Chat Sync
            db.ref(`rooms/${roomID}/chat`).on('child_added', s => {
                let m = s.val();
                let isM = m.user === myName;
                document.getElementById('chat-messages').innerHTML += `
                    <div class="msg-box ${isM?'mine':''}" id="msg-${s.key}">
                        <i class="fas fa-trash del-btn" onclick="deleteMsg('${s.key}')"></i>
                        <b style="font-size:11px; display:block; color:var(--primary);">${m.user}</b>
                        ${m.text}
                    </div>`;
                let box = document.getElementById('chat-messages');
                box.scrollTop = box.scrollHeight;
            });
            db.ref(`rooms/${roomID}/chat`).on('child_removed', s => document.getElementById(`msg-${s.key}`)?.remove());

            // Live Cursors
            db.ref(`rooms/${roomID}/cursors`).on('value', s => {
                otherCursors = s.val() || {};
                renderCursors();
            });
        }

        function loadDrawings() {
            db.ref(`rooms/${roomID}/drawings/p${currentPage}`).off();
            drawings = {};
            renderEngine();
            db.ref(`rooms/${roomID}/drawings/p${currentPage}`).on('child_added', s => { drawings[s.key] = s.val(); renderEngine(); });
            db.ref(`rooms/${roomID}/drawings/p${currentPage}`).on('child_removed', s => { delete drawings[s.key]; renderEngine(); });
            db.ref(`rooms/${roomID}/drawings/p${currentPage}`).on('value', s => { if(!s.exists()) { drawings = {}; renderEngine(); } });
        }

        // --- 5. The Physics & Render Engine ---
        function getMousePos(e) {
            return { x: (e.clientX - transform.x) / transform.scale, y: (e.clientY - transform.y) / transform.scale };
        }

        canvas.addEventListener('pointerdown', e => {
            if(!hasWritePermission && mode !== 'pan') return;
            if(isScreenLocked && !isTeacher) return;
            
            if(mode === 'pan' || e.button === 1) { isPanning = true; startX = e.clientX; startY = e.clientY; return; }
            
            isDrawing = true;
            let pos = getMousePos(e);
            currentPath = [{x: pos.x, y: pos.y}];
            
            if(mode === 'eraser' && subMode === 'object') {
                // Object Eraser Logic
                eraseObjectAt(pos.x, pos.y);
                isDrawing = false;
            }
        });

        window.addEventListener('pointermove', e => {
            // Cursor Sync (Throttled)
            if(hasWritePermission && !isScreenLocked) {
                if(Math.random() > 0.5) db.ref(`rooms/${roomID}/cursors/${myName}`).set({x: e.clientX, y: e.clientY});
            }

            if(isPanning) {
                transform.x += e.movementX; transform.y += e.movementY;
                renderEngine(); renderCursors(); return;
            }
            if(!isDrawing) return;

            let pos = getMousePos(e);
            currentPath.push(pos);
            
            // Fast Local Render for smooth feeling
            renderEngine();
            drawLivePath(currentPath, mode, subMode, color, size);
        });

        window.addEventListener('pointerup', e => {
            isPanning = false;
            if(!isDrawing) return;
            isDrawing = false;
            
            if(currentPath.length > 1) {
                let finalData = { mode, subMode, color, size, points: currentPath, user: myName };
                let newRef = db.ref(`rooms/${roomID}/drawings/p${currentPage}`).push();
                newRef.set(finalData);
                
                // Laser logic (Auto remove after 3s)
                if(mode === 'pen' && subMode === 'laser') setTimeout(() => newRef.remove(), 2500);
            }
            currentPath = [];
        });

        // Zoom Engine
        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            let zoom = Math.exp(e.deltaY * -0.001);
            let oldScale = transform.scale;
            transform.scale *= zoom;
            transform.scale = Math.min(Math.max(transform.scale, 0.2), 5); // Clamp
            
            // Zoom towards mouse pointer
            let mouseX = e.clientX; let mouseY = e.clientY;
            transform.x = mouseX - (mouseX - transform.x) * (transform.scale / oldScale);
            transform.y = mouseY - (mouseY - transform.y) * (transform.scale / oldScale);
            
            renderEngine(); renderCursors();
        });

        function resetView() { transform = {x:0, y:0, scale:1}; renderEngine(); renderCursors(); }

        // Core Render Loop
        function renderEngine() {
            // Fill background based on theme
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--canvas-bg');
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.translate(transform.x, transform.y);
            ctx.scale(transform.scale, transform.scale);

            // Draw all saved objects
            for(let key in drawings) {
                let d = drawings[key];
                drawLivePath(d.points, d.mode, d.subMode, d.color, d.size);
            }
            ctx.restore();
        }

        // Advanced Brush Logic
        function drawLivePath(pts, m, sm, c, sz) {
            if(!pts || pts.length === 0) return;
            ctx.save();
            ctx.beginPath();
            
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.lineWidth = sz; ctx.strokeStyle = c; ctx.fillStyle = c;
            
            if(m === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = sz * 5;
                ctx.moveTo(pts[0].x, pts[0].y); pts.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
            } else if(m === 'pen') {
                ctx.globalCompositeOperation = 'source-over';
                if(sm === 'neon') { ctx.shadowBlur = 20; ctx.shadowColor = c; ctx.lineWidth = sz/1.5; }
                else if(sm === 'marker') { ctx.globalAlpha = 0.4; ctx.lineCap = 'butt'; ctx.lineWidth = sz*2; }
                else if(sm === 'pencil') { ctx.globalAlpha = 0.6; ctx.lineWidth = sz/2; }
                else if(sm === 'laser') { ctx.shadowBlur = 10; ctx.shadowColor = c; ctx.lineWidth = sz+2; }
                
                if(sm === 'calligraphy') {
                    // Calligraphy simulation (drawing multiple lines to simulate chisel tip)
                    for(let i=0; i<pts.length-1; i++) {
                        ctx.beginPath(); ctx.lineWidth = 1;
                        ctx.moveTo(pts[i].x - sz, pts[i].y + sz); ctx.lineTo(pts[i+1].x - sz, pts[i+1].y + sz);
                        ctx.moveTo(pts[i].x + sz, pts[i].y - sz); ctx.lineTo(pts[i+1].x + sz, pts[i+1].y - sz);
                        ctx.stroke();
                    }
                } else {
                    ctx.moveTo(pts[0].x, pts[0].y); pts.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
                }
            } else if(m === 'shape') {
                let start = pts[0], end = pts[pts.length-1];
                let w = end.x - start.x, h = end.y - start.y;
                ctx.globalCompositeOperation = 'source-over';
                
                if(sm === 'rect') ctx.strokeRect(start.x, start.y, w, h);
                else if(sm === 'circle') { ctx.arc(start.x, start.y, Math.sqrt(w*w+h*h), 0, Math.PI*2); ctx.stroke(); }
                else if(sm === 'line') { ctx.moveTo(start.x, start.y); ctx.lineTo(end.x, end.y); ctx.stroke(); }
                else if(sm === 'triangle') { ctx.moveTo(start.x+w/2, start.y); ctx.lineTo(start.x, start.y+h); ctx.lineTo(end.x, end.y); ctx.closePath(); ctx.stroke(); }
                else if(sm === 'arrow') {
                    let ang = Math.atan2(h, w), hd = sz*3 + 10;
                    ctx.moveTo(start.x, start.y); ctx.lineTo(end.x, end.y);
                    ctx.lineTo(end.x - hd*Math.cos(ang-Math.PI/6), end.y - hd*Math.sin(ang-Math.PI/6));
                    ctx.moveTo(end.x, end.y); ctx.lineTo(end.x - hd*Math.cos(ang+Math.PI/6), end.y - hd*Math.sin(ang+Math.PI/6));
                    ctx.stroke();
                }
            }
            ctx.restore();
        }

        // Object Eraser functionality (Checks bounds)
        function eraseObjectAt(x, y) {
            let threshold = 20;
            for(let key in drawings) {
                let pts = drawings[key].points;
                if(!pts) continue;
                for(let p of pts) {
                    if(Math.abs(p.x - x) < threshold && Math.abs(p.y - y) < threshold) {
                        db.ref(`rooms/${roomID}/drawings/p${currentPage}/${key}`).remove();
                        return; // Remove one object per click
                    }
                }
            }
        }

        // Render Student Cursors Layer
        function renderCursors() {
            cursorsCtx.clearRect(0,0, cursorsCanvas.width, cursorsCanvas.height);
            for(let user in otherCursors) {
                if(user === myName) continue;
                let c = otherCursors[user];
                cursorsCtx.fillStyle = 'var(--danger)';
                cursorsCtx.beginPath();
                cursorsCtx.arc(c.x, c.y, 5, 0, Math.PI*2);
                cursorsCtx.fill();
                cursorsCtx.font = "10px Cairo";
                cursorsCtx.fillText(user, c.x + 10, c.y + 10);
            }
        }

        // --- 6. UI & Admin Controls ---
        function setMode(m, sm) {
            mode = m; subMode = sm;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            if(m === 'pen') document.getElementById('pen-btn').classList.add('active');
            else if(m === 'shape') document.getElementById('shape-btn').classList.add('active');
            else if(m === 'eraser') document.getElementById('eraser-btn').classList.add('active');
            else if(m === 'pan') document.getElementById('pan-btn').classList.add('active');
            closeMenus();
        }

        function initColors() {
            const clrs = ['#ffffff', '#000000', '#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#64748b', '#00f2ff'];
            let container = document.getElementById('colors-container');
            clrs.forEach(c => {
                let d = document.createElement('div');
                d.className = 'color-dot'; d.style.backgroundColor = c;
                d.onclick = () => { color = c; closeMenus(); };
                container.appendChild(d);
            });
            // Adapt default color to theme
            let isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            color = isDark ? '#ffffff' : '#000000';
        }

        document.getElementById('size-slider').oninput = e => { size = parseInt(e.target.value); document.getElementById('size-val').innerText = size; };
        document.getElementById('custom-color').oninput = e => color = e.target.value;

        function toggleTheme() {
            let html = document.documentElement;
            let current = html.getAttribute('data-theme');
            let next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            document.getElementById('theme-icon').className = next === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            color = next === 'dark' ? '#ffffff' : '#000000';
            renderEngine();
        }

        function changePage(d) {
            if(!isTeacher) return;
            let newP = Math.max(1, currentPage + d);
            db.ref(`rooms/${roomID}/state/page`).set(newP);
        }

        function clearFullBoard() {
            if(isTeacher && confirm("هتمسح السبورة كلها للكل يا مستر؟")) {
                db.ref(`rooms/${roomID}/drawings/p${currentPage}`).remove();
            }
        }

        function togglePermission(user, current) { db.ref(`rooms/${roomID}/users/${user}/canDraw`).set(!current); }
        function toggleScreenLock() { if(isTeacher) db.ref(`rooms/${roomID}/config/locked`).set(!isScreenLocked); }
        function muteAllChat() { if(isTeacher) db.ref(`rooms/${roomID}/config/chatMuted`).set(!isChatMuted); alert(isChatMuted ? "تم فتح الشات" : "تم كتم الشات للطلاب!"); }

        function sendMsg() {
            if(isChatMuted && !isTeacher) return alert("المستر قافل الشات دلوقتي!");
            let inp = document.getElementById('chat-inp');
            let text = inp.value.trim();
            if(!text) return;
            // Profanity Filter Simulation
            const badWords = ['شتم', 'غبي', 'حمار']; 
            if(badWords.some(w => text.includes(w))) return alert("عيب الكلمة دي يا بطل!");
            
            db.ref(`rooms/${roomID}/chat`).push({ user: myName, text });
            inp.value = "";
        }
        function deleteMsg(k) { if(isTeacher) db.ref(`rooms/${roomID}/chat/${k}`).remove(); }

        // Layout Toggles
        function cycleToolbarPosition() {
            const c = document.getElementById('toolbar-container');
            const poses = ['pos-bottom', 'pos-left', 'pos-top', 'pos-right'];
            let cur = poses.find(p => c.classList.contains(p));
            let next = poses[(poses.indexOf(cur) + 1) % poses.length];
            c.className = next;
            document.getElementById('smart-toolbar').style.flexDirection = next.includes('left') || next.includes('right') ? 'column' : 'row';
            closeMenus();
        }
        function toggleDynamicMenu(id) {
            let m = document.getElementById(id); let act = m.classList.contains('active-menu');
            closeMenus();
            if(!act) {
                let pos = document.getElementById('toolbar-container').className;
                m.className = 'pop-menu active-menu';
                if(pos.includes('bottom')) m.classList.add('anchor-top');
                else if(pos.includes('top')) m.classList.add('anchor-bottom');
                else if(pos.includes('left')) m.classList.add('anchor-right');
                else if(pos.includes('right')) m.classList.add('anchor-left');
            }
        }
        function closeMenus() { document.querySelectorAll('.pop-menu').forEach(m => m.classList.remove('active-menu')); }
        function toggleChat() { let c = document.getElementById('chat-window'); c.style.display = c.style.display === 'flex' ? 'none' : 'flex'; }
        function toggleSidebar() { let s = document.getElementById('users-sidebar'); s.style.display = s.style.display === 'block' ? 'none' : 'block'; }
        function toggleFullScreen() { if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }

        // Cleanups
        window.onclick = e => { if(!e.target.closest('.tool-btn') && !e.target.closest('.pop-menu')) closeMenus(); };
        window.addEventListener('beforeunload', () => { if(myName) db.ref(`rooms/${roomID}/cursors/${myName}`).remove(); });

    </script>
</body>
